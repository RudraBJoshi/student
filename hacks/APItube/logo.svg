<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lg-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <linearGradient id="lg-mid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="glow-play" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-dot" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="6" y="6" width="188" height="188" rx="34" fill="#08080f"/>
  <!-- Gradient border -->
  <rect x="6" y="6" width="188" height="188" rx="34" fill="none" stroke="url(#lg-main)" stroke-width="2.5"/>

  <!-- Subtle inner ring -->
  <rect x="16" y="16" width="168" height="168" rx="26" fill="none" stroke="url(#lg-main)" stroke-width="0.6" stroke-opacity="0.15"/>

  <!-- API input nodes (left side) -->
  <circle cx="32" cy="68" r="5.5" fill="#00d4ff" filter="url(#glow-dot)" opacity="0.9"/>
  <circle cx="32" cy="100" r="5.5" fill="#5e88f7" filter="url(#glow-dot)" opacity="0.75"/>
  <circle cx="32" cy="132" r="5.5" fill="#7b2fff" filter="url(#glow-dot)" opacity="0.65"/>

  <!-- Node label dots (tiny) -->
  <circle cx="32" cy="68" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="32" cy="100" r="2.5" fill="#fff" opacity="0.5"/>
  <circle cx="32" cy="132" r="2.5" fill="#fff" opacity="0.4"/>

  <!-- Dashed connector lines: nodes → play triangle left edge -->
  <line x1="38" y1="68" x2="74" y2="68" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,3.5" opacity="0.45"/>
  <line x1="38" y1="100" x2="74" y2="100" stroke="url(#lg-mid)" stroke-width="1.5" stroke-dasharray="4,3.5" opacity="0.45"/>
  <line x1="38" y1="132" x2="74" y2="132" stroke="#7b2fff" stroke-width="1.5" stroke-dasharray="4,3.5" opacity="0.45"/>

  <!-- Main play triangle (API merger = stream) -->
  <polygon points="74,56 74,144 156,100" fill="url(#lg-main)" filter="url(#glow-play)"/>

  <!-- Output stream line from tip -->
  <line x1="156" y1="100" x2="172" y2="100" stroke="#7b2fff" stroke-width="2" opacity="0.65"/>
  <!-- Output node -->
  <circle cx="177" cy="100" r="6.5" fill="#7b2fff" filter="url(#glow-dot)" opacity="0.9"/>
  <circle cx="177" cy="100" r="3" fill="#fff" opacity="0.6"/>
</svg>
