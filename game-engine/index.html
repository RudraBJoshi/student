<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Platformer Engine — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #ccc;
    }

    h1 {
      font-size: 1rem;
      color: #4a9eff;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    #canvas-wrap {
      position: relative;
      display: inline-block;
      border: 2px solid #1e3a5f;
      box-shadow: 0 0 40px rgba(74,158,255,0.2);
    }

    #game-canvas {
      display: block;
      /* JS will set responsive width/height via style */
      width: 720px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      color: #4a9eff;
      font-size: 1.1rem;
      letter-spacing: 2px;
    }

    .controls {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #445566;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls span {
      background: #111;
      padding: 4px 10px;
      border: 1px solid #223;
      border-radius: 3px;
    }

    kbd {
      color: #8af;
    }
  </style>
</head>
<body>
  <h1>2D Platformer Engine</h1>

  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="loading">LOADING…</div>
  </div>

  <div class="controls">
    <span><kbd>← →</kbd> / <kbd>A D</kbd> Move</span>
    <span><kbd>↑</kbd> / <kbd>W</kbd> / <kbd>Space</kbd> Jump</span>
    <span><kbd>Shift</kbd> Dash</span>
    <span><kbd>Stomp</kbd> Kill enemies</span>
    <span><kbd>R</kbd> Restart</span>
  </div>

  <script type="module">
    import('./demo/game.js').then(() => {
      document.getElementById('loading').style.display = 'none';
    }).catch(err => {
      document.getElementById('loading').textContent = 'Error: ' + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
